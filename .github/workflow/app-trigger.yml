name: App-trigger

on:
  push:
    branches: [main]
    paths:
      - 'dockerfile/**'

jobs:
 # ── 1. Dockerfile change trigger ──────────────────────────────────────────
  build:
    name: Dockerfile change trigger
    runs-on: ubuntu-latest

    steps: 
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            dockerfile/**

      - name: Get changed dockerfile directories
        id: change-dir
        run: |
          APP_NAMES=$(echo "${{ steps.changed-files.outputs.all_changed_files }}" \
            | tr ' ' '\n' \
            | xargs -n1 basename \
            | cut -d'-' -f2 \
            | sort -u \
            | tr '\n' ' ')

          echo "App names: $APP_NAMES"

          echo "app_names=$APP_NAMES" >> $GITHUB_OUTPUT

      - name: Repository Dispatch
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.CI_PAT }}
          repository: reenipaul16/cicd-orchestration
          event-type: push-dockerfile
          client-payload: '{"ref": "${{ github.ref }}", "sha": "${{ github.sha }}", "app_names":"${{ steps.extract.outputs.app_names }}"}'
